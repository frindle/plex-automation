services:
  arr-webhook:
    build: .
    container_name: arr-webhook
    restart: unless-stopped
    entrypoint: ["python", "-u", "arr-webhook.py"]
    environment:
      DELUGE_URL: "http://10.0.0.2:8112"
      DELUGE_PASSWORD: ${DELUGE_PASSWORD}
      SONARR_URL: "http://10.0.0.8:8989"
      SONARR_API_KEY: ${SONARR_API_KEY}
      RADARR_URL: "http://10.0.0.7:7878"
      RADARR_API_KEY: ${RADARR_API_KEY}
      SONARR_UPGRADE_LABEL: "sonarr-upgrade"
      RADARR_UPGRADE_LABEL: "radarr-upgrade"
      PORT: "9876"
      SEEDING_DIR: "/data/Downloads/Just4Seeding"
      SEED_DAYS: "21"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      UPLOAD_RATE_LIMIT_MBIT: "5"
    networks:
      br0:
        ipv4_address: 10.0.0.4
    volumes:
      - ./data:/data
      - "/mnt/user/data/Media/Movies:/media/movies"
      - "/mnt/user/data/Media/TV Shows:/media/tv:ro"
      - "/mnt/user/data/Media/Music:/media/music:ro"

networks:
  br0:
    external: true
